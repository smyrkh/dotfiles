command_timeout = 1500

format = """
$directory$fill$status${custom.git_user}$git_branch$nix_shell$nodejs$python
$username$hostname$character"""

[directory]
format = "\\[[$path]($style)\\]"
style = "bold red"
truncation_length = 0
truncate_to_repo = false

[fill]
symbol = " "

[status]
disabled = false
format = "<[$int]($style)>"
style = "bold yellow"

[custom.git_user]
command = "git config user.name"
when = "git rev-parse --is-inside-work-tree"
format = "[$output]($style)"
style = "bold purple"

[git_branch]
format = "@[$branch]($style)"
style = "bold purple"

[nix_shell]
format = "\\[[$symbol$state( \\($name\\))]($style)\\]"
symbol = "nix"
style = "bold blue"

[nodejs]
format = "\\[[$version]($style)\\]"

[python]
format = "\\[[$version]($style)\\]"

[username]
show_always = true
format = "[$user]($style)"
style_user = "bold cyan"

[hostname]
ssh_only = false
format = "@[$hostname]($style)"
style = "bold cyan"

[character]
success_symbol = " [%](bold white)"
error_symbol = " [%](bold red)"
